<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main class="content">
      <article class="result">
        <h2 class="result__heading">Your Result</h2>
        <div class="result__scores">
          <p class="result__score">76</p>
          <p class="result__total">of 100</p>
        </div>
        <p class="result__feedback">Great</p>
        <p class="result__text">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </article>

      <article class="summary">
        <h2 class="summary__heading">Summary</h2>
        <ul class="summary__list">
          <li class="summary__item">
            <span class="summary__item--title"> Reaction</span>
            <span class="summary__item--score"><b>80</b>/100</span>
          </li>
          <li class="summary__item">
            <span class="summary__item--title">Memory</span>
            <span class="summary__item--score"><b>92</b>/100</span>
          </li>
          <li class="summary__item">
            <span class="summary__item--title">Verbal</span>
            <span class="summary__item--score"><b>61</b>/100</span>
          </li>
          <li class="summary__item">
            <span class="summary__item--title">Visual</span>
            <span class="summary__item--score"><b>72</b>/100</span>
          </li>
        </ul>
        <button class="summary_button">Continue</button>
      </article>
    </main>
  </body>
</html>
