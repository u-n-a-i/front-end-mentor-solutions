<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Stats preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="card__header"></div>
      <div class="card__body">
        <h2 class="card__heading">
          Get <span class="card__heading--important">insights</span> that help
          your business grow.
        </h2>
        <p class="card__paragraph">
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>

        <div class="card__stats">
          <div class="card__stat">
            <p class="card__stat--value">10k+</p>
            <p class="card__stat--title">companies</p>
          </div>
          <div class="card__stat">
            <p class="card__stat--value">314</p>
            <p class="card__stat--title">templates</p>
          </div>
          <div class="card__stat">
            <p class="card__stat--value">12M+</p>
            <p class="card__stat--title">queries</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
