<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Order summary card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card__header"></div>
      <div class="card__body">
        <h2 class="card__heading">Order Summary</h2>
        <p class="card__paragraph">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="card__flex">
          <img src="./images/icon-music.svg" alt="music icon" />
          <div class="card__plan">
            <p class="card__plan--time">Annual Plan</p>
            <p class="card__plan--price">$59.99/year</p>
          </div>
          <a href="#" class="card__link">Change</a>
        </div>
        <button class="card__btn">Proceed to Payment</button>
        <a class="card__order" href="#">Cancel Order</a>
      </div>
    </div>
  </body>
</html>
