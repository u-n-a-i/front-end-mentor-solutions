<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card_image"></div>
      <div class="card__header">
        <span class="card__header__tag">Learning</span>
        <div class="card__header__published">Published 21 Dec 2023</div>
      </div>
      <div class="card__body">
        <div class="card__body__header">
          <h2><a href="#">HTML & CSS foundations</a></h2>
        </div>
        <div class="card__body_paragraph">
          <p>
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
      </div>
      <div class="card__footer">
        <div class="card__footer__avatar"></div>
        <div class="card__footer__autor">Greg Hooper</div>
      </div>
    </div>
  </body>
</html>
