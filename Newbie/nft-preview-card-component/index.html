<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card__image">
        <img src="./images/image-equilibrium.jpg" alt="Equilibrium Logo" />
      </div>
      <h2 class="card__heading">Equilibrium #3429</h2>
      <p class="card__text">
        Our Equilibrium collection promotes balance and calm.
      </p>
      <div class="data">
        <p class="data__ethereum">0.041 ETH</p>
        <p class="data__date">3 days left Creation</p>
      </div>
      <div class="creator">
        <img
          src="./images/image-avatar.png"
          alt="creator avatar"
          class="creator__avatar"
        />
        <p class="creator__name">
          Creation of <a href="#" class="creator__name--link">Jules Wyvern</a>
        </p>
      </div>
    </div>
  </body>
</html>
