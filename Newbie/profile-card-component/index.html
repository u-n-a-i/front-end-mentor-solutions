<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Profile card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card__profile">
        <img
          src="./images/image-victor.jpg"
          alt="profile avatar"
          class="card__image"
        />
        <h2 class="card__name">
          Victor Crest <span class="card__age">26</span>
        </h2>
        <p class="card__location">London</p>
      </div>
      <div class="card__stats">
        <div class="stat">
          <p class="stat__value">80K</p>
          <p class="stat__title">Followers</p>
        </div>
        <div class="stat">
          <p class="stat__value">803K</p>
          <p class="stat__title">Likes</p>
        </div>
        <div class="stat">
          <p class="stat__value">1.4K</p>
          <p class="stat__title">Photos</p>
        </div>
      </div>
    </div>
  </body>
</html>
